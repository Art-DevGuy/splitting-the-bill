<!-- file: index.html -->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Bill Splitter</title>
        <link rel="icon" type="image/x-icon" href="./money-icon.png">

        <style>
            body {
                font-family: Arial;
                margin: 40px;
            }

            .controls {
                margin-bottom: 20px;
            }

            input {
                padding: 6px;
            }

            button {
                padding: 6px 10px;
                margin-left: 5px;
                cursor: pointer;
            }

            table {
                border-collapse: collapse;
                margin-top: 20px;
            }

            th,
            td {
                border: 1px solid #ccc;
                padding: 8px;
                text-align: center;
            }

            th {
                background: #f2f2f2;
            }

            .remove-btn {
                background: #ffdede;
                border: 1px solid #cc0000;
                padding: 2px 6px;
                cursor: pointer;
                margin-left: 4px;
            }

            tfoot td {
                font-weight: bold;
                background: #eef;
            }

            .unassigned-row{
                background:#ffcccc;
            }

        </style>
    </head>

    <body>
        <h1>Bill Splitter</h1>

        <div class="controls">
            <input id="personName" placeholder="Person name" />
            <button onclick="addPerson()">Add Person</button>
        </div>

        <div class="controls">
            <input id="itemName" placeholder="Item name" />
            <input id="itemCost" type="number" step="0.01" placeholder="Cost" />
            <button onclick="addItem()">Add Item</button>
        </div>

        <button onclick="calculate()">Calculate Split</button>
        <button onclick="clearAll()">Reset</button>

        <div id="tableContainer"></div>

        <script>
            let people = [];
            let items = [];
            let selections = {};

            const STORAGE_KEY = "bill_splitter_data";

            function saveState() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ people, items, selections }));
            }

            function loadState() {
                const saved = localStorage.getItem(STORAGE_KEY);

                if (!saved) return;

                const data = JSON.parse(saved);

                people = data.people || [];
                items = data.items || [];
                selections = data.selections || {};
            }

            function addPerson() {
                const input = document.getElementById("personName");
                const name = input.value.trim();

                if (!name) return;

                people.push(name);

                input.value = "";

                saveState();
                renderTable();
            }

            function addItem() {
                const nameInput = document.getElementById("itemName");
                const costInput = document.getElementById("itemCost");

                const name = nameInput.value.trim();
                const cost = parseFloat(costInput.value);

                if (!name || isNaN(cost)) return;

                items.push({ name, cost });

                nameInput.value = "";
                costInput.value = "";

                saveState();
                renderTable();
            }

            function removePerson(index) {
                people.splice(index, 1);

                const newSelections = {};

                Object.keys(selections).forEach((itemIndex) => {
                    newSelections[itemIndex] = {};

                    Object.keys(selections[itemIndex]).forEach((personIndex) => {
                        personIndex = parseInt(personIndex);

                        if (personIndex === index) return;

                        const newIndex = personIndex > index ? personIndex - 1 : personIndex;

                        newSelections[itemIndex][newIndex] = selections[itemIndex][personIndex];
                    });
                });

                selections = newSelections;

                saveState();
                renderTable();
            }

            function removeItem(index) {
                items.splice(index, 1);

                const newSelections = {};

                Object.keys(selections).forEach((itemIndex) => {
                    itemIndex = parseInt(itemIndex);

                    if (itemIndex === index) return;

                    const newIndex = itemIndex > index ? itemIndex - 1 : itemIndex;

                    newSelections[newIndex] = selections[itemIndex];
                });

                selections = newSelections;

                saveState();
                renderTable();
            }

            function toggleSelection(itemIndex, personIndex, checked) {
                if(!selections[itemIndex])
                    selections[itemIndex]={}

                selections[itemIndex][personIndex]=checked

                updateRowHighlight(itemIndex)

                saveState()
            }

            function renderTable() {
                const container = document.getElementById("tableContainer");

                if (people.length === 0) {
                    container.innerHTML = "";
                    return;
                }

                let html = "<table>";

                html += "<thead><tr>";
                html += "<th>Item</th>";
                html += "<th>Cost</th>";
                html += "<th>Remove</th>";

                people.forEach((p, i) => {
                    html += `
                        <th>
                        ${p}
                        <button class="remove-btn"
                        onclick="removePerson(${i})">x</button>
                        </th>
                        `;
                });

                html += "<th>Row Total</th>";

                html += "</tr></thead><tbody>";

                items.forEach((item, itemIndex) => {
                    html += `<tr data-item="${itemIndex}">`;

                    html += `<td>${item.name}</td>`;

                    html += `<td>${item.cost.toFixed(2)}</td>`;

                    html += `
                        <td>
                        <button class="remove-btn"
                        onclick="removeItem(${itemIndex})">x</button>
                        </td>
                        `;

                    people.forEach((_, personIndex) => {
                        const checked = selections[itemIndex] && selections[itemIndex][personIndex];

                    html+=`
                        <td>
                        <input
                        type="checkbox"
                        data-item="${itemIndex}"
                        ${checked?"checked":""}
                        onchange="toggleSelection(${itemIndex},${personIndex},this.checked)"
                        >
                        </td>
                        `;
                        });

                    html += `<td></td>`;

                    html += "</tr>";
                });

                html += "</tbody>";
                html += "<tfoot id='totalsRow'></tfoot>";
                html += "</table>";

                container.innerHTML = html;

                items.forEach((_,i)=>updateRowHighlight(i))
            }

            function calculate() {
                const totals = new Array(people.length).fill(0);

                let costSum = 0;

                items.forEach((item, itemIndex) => {
                    costSum += item.cost;

                    if (!selections[itemIndex]) return;

                    const contributors = Object.entries(selections[itemIndex]).filter(([_, v]) => v).length;

                    if (contributors === 0) return;

                    const share = item.cost / contributors;

                    Object.entries(selections[itemIndex]).forEach(([personIndex, checked]) => {
                        if (checked) totals[personIndex] += share;
                    });
                });

                const grandTotal = totals.reduce((a, b) => a + b, 0);

                renderTotals(totals, costSum, grandTotal);
            }

            function renderTotals(totals, costSum, grandTotal) {
                let html = "<tr>";

                html += `<td>Total</td>`;

                html += `<td>${costSum.toFixed(2)}</td>`;

                html += `<td></td>`;

                totals.forEach((v) => {
                    html += `<td>${v.toFixed(2)}</td>`;
                });

                html += `<td>${grandTotal.toFixed(2)}</td>`;

                html += "</tr>";

                document.getElementById("totalsRow").innerHTML = html;
            }

            function clearAll() {
                if (!confirm("Reset everything?")) return;

                localStorage.removeItem(STORAGE_KEY);

                people = [];
                items = [];
                selections = {};

                renderTable();
            }

            function updateRowHighlight(itemIndex){

                const row=document.querySelector(`tr[data-item='${itemIndex}']`)
                
                if(!row)return

                const checkboxes=row.querySelectorAll("input[type=checkbox]")

                let anyChecked=false

                checkboxes.forEach(cb=>{
                    if(cb.checked) anyChecked=true
                })

                if(anyChecked)
                    row.classList.remove("unassigned-row")
                else
                    row.classList.add("unassigned-row")
            }

            loadState();
            renderTable();
        </script>
    </body>
</html>
